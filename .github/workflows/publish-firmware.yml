name: Publish Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware
    uses: esphome/workflows/.github/workflows/build.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    with:
      files: |
        modotabmount-smart.factory.yaml
      esphome-version: 2026.4.3
      release-summary: ${{ github.event.release.body }}
      release-url: ${{ github.event.release.html_url }}
      release-version: ${{ github.event.release.tag_name }}

  upload-to-release:
    name: Upload to Release
    needs:
      - build-firmware
    uses: esphome/workflows/.github/workflows/upload-to-gh-release.yml@2025.10.0
    with:
      version: ${{ github.event.release.tag_name }}
