esphome:
  name: modotabmount-smart
  friendly_name: Modo Tab Mount Smart
  name_add_mac_suffix: true

  on_boot:
    - priority: 250.0
      then:
        - lambda: |-
            // Check if there are ANY credentials stored in the WiFi component
            if (wifi::global_wifi_component->get_sta().get_ssid().empty()) {
              ESP_LOGI("main", "Factory state detected: No WiFi credentials. Starting scanner.");
              id(led_ap_mode).execute();
            } else {
              ESP_LOGI("main", "Credentials found. Waiting for WiFi connection...");
            }

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"
  
logger:
  
debug:
  update_interval: 10s

network:
  enable_high_performance: true

mdns:
  id: my_mdns

api:

wifi:
  ap:
  power_save_mode: none
  on_connect:
    then:
      - logger.log: "WiFi connected"
      - script.execute: led_ap_mode_stop
      - script.execute: led_wifi_connected
           
captive_portal:

ota:
  - platform: esphome

web_server:
  port: 80
  version: 3
  log: false
  ota: false

esp32_ble:
  disable_bt_logs: true

bluetooth_proxy:
  id: bt_proxy
  active: false
  connection_slots: 1
  cache_services: false

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true

# --------------------------------------------------------------------
# Globals
# --------------------------------------------------------------------
globals: 
  - id: prev_led_brightness
    type: float
    restore_value: no
    initial_value: '1.0'

  - id: last_charging_state
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: power_accum
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: current_accum
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: voltage_accum
    type: float
    restore_value: no
    initial_value: '0.0'

  - id: sample_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: led_clamp_active
    type: bool
    restore_value: no
    initial_value: 'false'

  # ownership to prevent clamp touching AP/WiFi feedback
  - id: led_mode
    type: int
    restore_value: no
    initial_value: '0'
    # 0 = user
    # 1 = ap_mode
    # 2 = wifi_feedback

# --------------------------------------------------------------------
# ⚡ Charging control
# --------------------------------------------------------------------

switch:
  - platform: gpio
    pin: GPIO10
    id: tablet_charging
    name: "Tablet Charging"
    internal: false
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin: GPIO6
    id: ilim_low
    name: "Low Current"
    internal: false
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Bluetooth Enabled"
    id: bluetooth_switch
    optimistic: true
    restore_mode: ALWAYS_ON
    entity_category: config
    icon: "mdi:bluetooth"
    on_turn_on:
      then:
        - logger.log: "Bluetooth radio enabled - rebooting to apply"
        - button.press: restart_button
    on_turn_off:
      then:
        - esp32_ble_tracker.stop: # Use the correct action for your BLE platform
        - logger.log: "Bluetooth radio disabled"
        - lambda: |-
            if (id(led_clamp_active)) {
              auto call = id(addressable_led).turn_on();
              call.set_brightness(id(prev_led_brightness));
              call.perform();
              id(led_clamp_active) = false;
            }
            
# --------------------------------------------------------------------
# Addressable LED
# --------------------------------------------------------------------
light:
  - platform: esp32_rmt_led_strip
    id: addressable_led
    name: "LED"
    icon: "mdi:television-ambient-light"
    chipset: WS2812
    pin: GPIO3
    num_leds: 64
    rgb_order: GRB
    default_transition_length: 0s

    on_state:
      then:
        - script.execute: led_apply_clamp_deferred

    effects:
      - addressable_rainbow:
          name: Rainbow
      - addressable_color_wipe:
          name: Color Wipe
      - addressable_twinkle:
          name: Twinkle
      - addressable_scan:
          name: Scanner
          move_interval: 50ms
      - pulse:
          name: Pulse
          transition_length: 1000ms
          update_interval: 1000ms
      - pulse:
          name: Pulse Fast
          transition_length: 500ms
          update_interval: 500ms
      - random:
          name: Random Colors
      - addressable_scan:
          name: Energy Beam
          move_interval: 20ms

# --------------------------------------------------------------------
# LED system scripts (AP + WiFi feedback + clamp)
# --------------------------------------------------------------------
script:
  - id: led_apply_clamp_deferred
    mode: restart
    then:
      - delay: 0ms
      - lambda: |-
          // Do not touch system-owned LED modes (AP / WiFi feedback)
          if (id(led_mode) != 0) return;

          // Clamp only while charging
          if (!id(tablet_charging).state) return;

          // LED must be ON
          if (!id(addressable_led).current_values.is_on()) return;

          float allowed = id(led_dim_level).state / 100.0f;
          float current = id(addressable_led).current_values.get_brightness();

          // User sets LOWER brightness while charging → accept it
          if (current < allowed - 0.01f) {
            id(prev_led_brightness) = current;
            id(led_clamp_active) = false;
            return;
          }

          // Already within limits → nothing to do
          if (current <= allowed + 0.01f) return;

          // Above allowed → clamp
          if (!id(led_clamp_active)) {
            id(prev_led_brightness) = current;
            id(led_clamp_active) = true;
          }

          auto call = id(addressable_led).turn_on();
          call.set_brightness(allowed);
          call.perform();


  - id: led_ap_mode
    mode: restart
    then:
      - lambda: 'id(led_mode) = 1;'
      - light.turn_on:
          id: addressable_led
          effect: "Scanner"
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%

  - id: led_ap_mode_stop
    then:
      - if:
          condition:
            lambda: 'return id(led_mode) == 1;'
          then:
            - light.turn_off: addressable_led
            - lambda: 'id(led_mode) = 0;'

  - id: led_wifi_connected
    mode: restart
    then:
      - lambda: 'id(led_mode) = 2;'
      - light.turn_off:
          id: addressable_led
          transition_length: 0s
      - delay: 150ms
      - repeat:
          count: 3
          then:
            - light.turn_on:
                id: addressable_led
                brightness: 100%
                red: 0%
                green: 100%
                blue: 0%
                transition_length: 0s
            - delay: 250ms
            - light.turn_off:
                id: addressable_led
                transition_length: 0s
            - delay: 250ms
      - lambda: 'id(led_mode) = 0;'

# --------------------------------------------------------------------
# Text sensors
# --------------------------------------------------------------------
text_sensor:
  - platform: template
    name: "Charging Status"
    id: charging_status
    icon: "mdi:lightning-bolt-outline"
    update_interval: never

  - platform: debug
    device:
      name: "Device Info"
      disabled_by_default: true
    reset_reason:
      name: "Device Reset Reason"

# --------------------------------------------------------------------
# Sensors
# --------------------------------------------------------------------
sensor:
  - platform: template
    name: "Bus Voltage"
    id: avg_voltage
    unit_of_measurement: "V"
    accuracy_decimals: 2
    icon: "mdi:flash"
    device_class: voltage
    state_class: measurement
    lambda: |-
      return 0.0;
    update_interval: never

  - platform: template
    name: "Bus Voltage Inst."
    id: voltage_act
    unit_of_measurement: "V"
    icon: "mdi:flash-triangle-outline"
    device_class: voltage
    state_class: measurement
    lambda: |-
      return 0.0;
    update_interval: never
    disabled_by_default: true

  - platform: template
    name: "Current"
    id: avg_current
    unit_of_measurement: "A"
    accuracy_decimals: 3
    icon: "mdi:current-ac"
    device_class: current
    state_class: measurement
    lambda: |-
      return 0.0;
    update_interval: never

  - platform: template
    name: "Output Current Inst."
    id: current_act
    unit_of_measurement: "A"
    icon: "mdi:current-dc"
    device_class: current
    state_class: measurement
    lambda: |-
      return 0.0;
    update_interval: never
    disabled_by_default: true

  - platform: template
    name: "Power"
    id: avg_power
    unit_of_measurement: "W"
    accuracy_decimals: 2
    icon: "mdi:lightning-bolt"
    device_class: power
    state_class: measurement
    lambda: |-
      return 0.0;
    update_interval: never

  - platform: template
    name: "Output Power Inst."
    id: power_act
    unit_of_measurement: "W"
    icon: "mdi:flash-alert-outline"
    device_class: power
    state_class: measurement
    lambda: |-
      return 0.0;
    update_interval: never
    disabled_by_default: true

  - platform: ina219
    address: 0x40
    shunt_resistance: 0.01 ohm
    current:
      id: ina_current
      internal: true
    power:
      id: ina_power
      internal: true
    bus_voltage:
      id: ina_voltage
      internal: true
    update_interval: 1s

  # --- Diagnostics ---
  - platform: internal_temperature
    name: "ESP32 Internal Temp"
    id: esp32_internal_temp
    update_interval: 15s
    icon: "mdi:thermometer-lines"
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    type: seconds
    icon: "mdi:clock-outline"
    entity_category: diagnostic

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    icon: "mdi:wifi"
    entity_category: diagnostic

  - platform: debug
    free:
      name: "Heap Free"
      icon: "mdi:memory"
      disabled_by_default: true
    block:
      name: "Heap Max Block"
      icon: "mdi:memory"
      disabled_by_default: true
    loop_time:
      name: "Loop Time"
      icon: "mdi:timer-outline"
      disabled_by_default: true

# --------------------------------------------------------------------
# ⚙️ Configuration
# --------------------------------------------------------------------
number:
  - platform: template
    name: "Max ESP32 Temp."
    id: max_temp
    optimistic: true
    restore_value: true
    min_value: 70
    max_value: 100
    step: 1
    initial_value: 85
    unit_of_measurement: "°C"
    icon: "mdi:thermometer"
    entity_category: config

  - platform: template
    name: "Charging LED Dim Level"
    id: led_dim_level
    optimistic: true
    restore_value: true
    min_value: 50
    max_value: 100
    step: 1
    initial_value: 75
    unit_of_measurement: "%"
    icon: "mdi:brightness-6"
    entity_category: config

  - platform: template
    name: "Control Interval"
    id: control_interval
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 10
    step: 1
    initial_value: 1
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    disabled_by_default: true

button:
  - platform: restart
    id: restart_button
    name: "Restart Device"
    icon: "mdi:restart"
    entity_category: config

# --------------------------------------------------------------------
# THERMAL + STATUS + AVERAGING
# --------------------------------------------------------------------
interval:
  - interval: 1s
    then:
      - lambda: |-
          static uint32_t last_run = 0;
          uint32_t now = millis();

          uint32_t interval_ms = (uint32_t)(id(control_interval).state * 1000.0f);
          if (now - last_run < interval_ms) return;
          last_run = now;

          float temp = id(esp32_internal_temp).state;
          bool charging_on = id(tablet_charging).state;
          float max_temp_val = id(max_temp).state;

          static bool low_power = false;
          static bool cooling = false;
          static std::string last_status = "";

          std::string status = "Normal";

          if (!charging_on) {
            status = "Off";
            id(ilim_low).turn_off();
          } 
          else {
            // --- HARD OVERHEAT → disable charging completely ---
            if (temp >= max_temp_val + 5.0f) {
              id(tablet_charging).turn_off();
              cooling = true;
              low_power = false;
              status = "Overheat - Charging OFF";
            }
            // --- ENTER LOW POWER MODE ---
            else if (temp >= max_temp_val) {
              id(ilim_low).turn_on();
              low_power = true;
              status = "Low Power (Thermal)";
            }
            // --- EXIT LOW POWER ---
            else if (low_power && temp <= (max_temp_val - 3.0f)) {
              id(ilim_low).turn_off();
              low_power = false;
              status = "Normal";
            }
            // --- RECOVER FROM COOLING ---
            if (cooling && temp <= (max_temp_val - 5.0f)) {
              id(tablet_charging).turn_on();
              cooling = false;
              status = "Recovered";
            }
          }

          // Safe string comparison for status updates
          if (last_status != status) {
            id(charging_status).publish_state(status.c_str());
            last_status = status;
          }

          // --- Measurements Averaging ---
          id(power_act).publish_state(id(ina_power).state);
          id(current_act).publish_state(id(ina_current).state);
          id(voltage_act).publish_state(id(ina_voltage).state);

          id(power_accum) += id(ina_power).state;
          id(current_accum) += id(ina_current).state;
          id(voltage_accum) += id(ina_voltage).state;
          id(sample_count)++;

          if (id(sample_count) >= 30) {
            id(avg_power).publish_state(id(power_accum) / 30.0f);
            id(avg_current).publish_state(id(current_accum) / 30.0f);
            id(avg_voltage).publish_state(id(voltage_accum) / 30.0f);
            id(power_accum) = 0;
            id(current_accum) = 0;
            id(voltage_accum) = 0;
            id(sample_count) = 0;
          }
