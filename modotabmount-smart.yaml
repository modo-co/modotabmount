esphome:
  name: modotabmount-smart
  friendly_name: Modo Tab Mount Smart
  name_add_mac_suffix: true

  on_boot:
    - priority: 250.0
      then:
        - lambda: |-
            if (wifi::global_wifi_component->get_sta().get_ssid().empty()) {
              ESP_LOGI("main", "Factory state detected: No WiFi credentials. Starting scanner.");
              id(led_ap_mode).execute();
            } else {
              ESP_LOGI("main", "Credentials found. Waiting for WiFi connection...");
            }

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

logger:

debug:
  update_interval: 10s

network:
  enable_high_performance: true

mdns:
  id: my_mdns

api:
  id: ha_api

wifi:
  ap:
  power_save_mode: none
  on_connect:
    then:
      - logger.log: "WiFi connected"
      - script.execute: led_ap_mode_stop
      - script.execute: led_wifi_connected

      - text_sensor.template.publish:
          id: bluetooth_status
          state: "Enabled (boot default)"

      - if:
          condition:
            lambda: 'return !id(ble_enabled);'
          then:
            - script.execute: delayed_ble_disable
            - logger.log: "Queued delayed BLE disable (45s after connect)"
          else:
            - logger.log: "Bluetooth enabled (default or user preference)"
            - text_sensor.template.publish:
                id: bluetooth_status
                state: "Enabled"

captive_portal:

ota:
  platform: esphome

web_server:
  port: 80
  version: 3
  log: false
  ota: false

esp32_ble:
  disable_bt_logs: true

bluetooth_proxy:
  id: bt_proxy
  active: false
  connection_slots: 1
  cache_services: false

i2c:
  sda: GPIO4
  scl: GPIO5
  scan: false

globals:
  - id: ble_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: led_mode
    type: int
    restore_value: no
    initial_value: '0'

switch:
  - platform: gpio
    id: tablet_charging_hw
    pin: GPIO10
    internal: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    pin: GPIO6
    id: ilim_low
    name: "Low Current"
    internal: false
    inverted: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    name: "Bluetooth Enabled"
    id: bluetooth_switch
    lambda: 'return id(ble_enabled);'
    optimistic: false
    restore_mode: DISABLED
    entity_category: config
    icon: "mdi:bluetooth-off"
    turn_on_action:
      - lambda: 'id(ble_enabled) = true;'
      - logger.log: "Bluetooth radio enabled"
      - text_sensor.template.publish:
          id: bluetooth_status
          state: "Enabled - rebooting in 5 seconds"
      - delay: 5s
      - button.press: restart_button

    turn_off_action:
      - ble.disable:
      - lambda: 'id(ble_enabled) = false;'
      - logger.log: "Bluetooth radio disabled"
      - text_sensor.template.publish:
          id: bluetooth_status
          state: "Disabled"

  - platform: template
    id: tablet_charging
    name: "Tablet Charging"
    icon: "mdi:tablet-cellphone"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(tablet_charging_hw).state;
    turn_on_action:
      - switch.turn_on: tablet_charging_hw
      - text_sensor.template.publish:
          id: charging_status
          state: "On"
    turn_off_action:
      - switch.turn_off: tablet_charging_hw
      - text_sensor.template.publish:
          id: charging_status
          state: "Off"

light:
  - platform: esp32_rmt_led_strip
    id: addressable_led
    name: "LED"
    icon: "mdi:television-ambient-light"
    chipset: WS2812
    pin: GPIO3
    num_leds: 64
    rgb_order: GRB
    default_transition_length: 0s
    effects:
      - addressable_rainbow:
          name: Rainbow
      - addressable_color_wipe:
          name: Color Wipe
      - addressable_twinkle:
          name: Twinkle
      - addressable_scan:
          name: Scanner
          move_interval: 50ms
      - pulse:
          name: Pulse
          transition_length: 1000ms
          update_interval: 1000ms
      - pulse:
          name: Pulse Fast
          transition_length: 500ms
          update_interval: 500ms
      - random:
          name: Random Colors
      - addressable_scan:
          name: Energy Beam
          move_interval: 20ms

script:
  - id: delayed_ble_disable
    mode: single
    then:
      - delay: 45s
      - ble.disable:
      - logger.log: "Delayed BLE disable executed"
      - text_sensor.template.publish:
          id: bluetooth_status
          state: "Disabled"

  - id: led_ap_mode
    mode: restart
    then:
      - lambda: 'id(led_mode) = 1;'
      - light.turn_on:
          id: addressable_led
          effect: "Scanner"
          brightness: 100%
          red: 0%
          green: 0%
          blue: 100%

  - id: led_ap_mode_stop
    then:
      - if:
          condition:
            lambda: 'return id(led_mode) == 1;'
          then:
            - light.turn_off: addressable_led
            - lambda: 'id(led_mode) = 0;'

  - id: led_wifi_connected
    mode: restart
    then:
      - lambda: 'id(led_mode) = 2;'
      - light.turn_off:
          id: addressable_led
          transition_length: 0s
      - delay: 150ms
      - repeat:
          count: 3
          then:
            - light.turn_on:
                id: addressable_led
                brightness: 100%
                red: 0%
                green: 100%
                blue: 0%
                transition_length: 0s
            - delay: 250ms
            - light.turn_off:
                id: addressable_led
                transition_length: 0s
            - delay: 250ms
      - lambda: 'id(led_mode) = 0;'

text_sensor:
  - platform: template
    name: "Charging Status"
    id: charging_status
    icon: "mdi:lightning-bolt-outline"
    update_interval: never

  - platform: template
    name: "Bluetooth Status"
    id: bluetooth_status
    icon: "mdi:bluetooth-settings"
    update_interval: never

  - platform: debug
    device:
      name: "Device Info"
      disabled_by_default: true
    reset_reason:
      name: "Device Reset Reason"

sensor:
  - platform: ina219
    address: 0x40
    shunt_resistance: 0.01 ohm
    current:
      name: "Current"
      id: ina_current
      unit_of_measurement: "A"
      accuracy_decimals: 3
      icon: "mdi:current-dc"
      device_class: current
      state_class: measurement
    power:
      name: "Power"
      id: ina_power
      unit_of_measurement: "W"
      accuracy_decimals: 3
      icon: "mdi:lightning-bolt"
      device_class: power
      state_class: measurement
    bus_voltage:
      name: "Bus Voltage"
      id: ina_voltage
      unit_of_measurement: "V"
      accuracy_decimals: 3
      icon: "mdi:flash"
      device_class: voltage
      state_class: measurement
    update_interval: 5s

  - platform: internal_temperature
    name: "ESP32 Internal Temp"
    id: esp32_internal_temp
    update_interval: 15s
    icon: "mdi:thermometer-lines"
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime"
    type: seconds
    icon: "mdi:clock-outline"
    entity_category: diagnostic

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    icon: "mdi:wifi"
    entity_category: diagnostic

  - platform: debug
    free:
      name: "Heap Free"
      icon: "mdi:memory"
      disabled_by_default: true
    block:
      name: "Heap Max Block"
      icon: "mdi:memory"
      disabled_by_default: true
    loop_time:
      name: "Loop Time"
      icon: "mdi:timer-outline"
      disabled_by_default: true

button:
  - platform: restart
    id: restart_button
    name: "Restart Device"
    icon: "mdi:restart"
    entity_category: config
